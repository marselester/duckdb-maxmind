name: CI

on: [push]

defaults:
  run:
    shell: bash

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
          - os: ubuntu-latest
          - os: macos-latest
          - os: macos-15-intel
          - os: windows-11-arm
          - os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      # The zig 0.16 aarch64-windows binary and LLVM libs are broken,
      # see https://codeberg.org/ziglang/zig/issues/31865.
      # As a workaround x86_64 Zig is used via Windows ARM emulation.
      - uses: mlugg/setup-zig@v2
        if: matrix.os != 'windows-11-arm'
      - name: Setup Zig
        if: matrix.os == 'windows-11-arm'
        run: |
          curl -fsSLo zig.zip https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip
          unzip -q zig.zip -d zig-sdk
          echo "$PWD/zig-sdk/zig-x86_64-windows-0.16.0" >> $GITHUB_PATH
          echo "DUCKDB_PLATFORM=windows_arm64" >> $GITHUB_ENV
      - name: Install Make
        if: runner.os == 'Windows'
        run: choco install make
      - name: Fetch submodules
        run: git submodule update --init --recursive
      - name: Build and test extension
        run: make configure release test_release

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-gnu
            artifact: duckdb_maxmind_linux_arm64
          - target: x86_64-linux-gnu
            artifact: duckdb_maxmind_linux_amd64
          - target: aarch64-linux-musl
            artifact: duckdb_maxmind_linux_arm64_musl
          - target: x86_64-linux-musl
            artifact: duckdb_maxmind_linux_amd64_musl
          - target: aarch64-macos
            artifact: duckdb_maxmind_osx_arm64
          - target: x86_64-macos
            artifact: duckdb_maxmind_osx_amd64
          - target: aarch64-windows
            artifact: duckdb_maxmind_windows_arm64
          - target: x86_64-windows
            artifact: duckdb_maxmind_windows_amd64
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
      - name: Fetch submodules
        run: git submodule update --init --recursive
      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: zig-out/lib/maxmind.duckdb_extension

  verify:
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            artifact: duckdb_maxmind_linux_arm64
          - os: ubuntu-latest
            artifact: duckdb_maxmind_linux_amd64
          - os: macos-latest
            artifact: duckdb_maxmind_osx_arm64
          - os: macos-15-intel
            artifact: duckdb_maxmind_osx_amd64
          - os: windows-11-arm
            artifact: duckdb_maxmind_windows_arm64
          - os: windows-latest
            artifact: duckdb_maxmind_windows_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.artifact }}
      - name: Verify extension loads
        run: |
          python -m venv .venv
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          pip install duckdb
          python << 'EOF'
          import duckdb
          db = duckdb.connect(config={"allow_unsigned_extensions": "true"})
          db.execute("LOAD './maxmind.duckdb_extension'")
          EOF

  deploy:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v7
      - name: Prepare repository structure
        # DuckDB fetches an extension from a URL path based on its own version,
        # so we need to publish a platform binary under each version.
        # The extension should work with DuckDB versions >= 1.2.0.
        run: |
          VERSIONS=$(gh api repos/duckdb/duckdb/releases --paginate --jq '.[].tag_name' | awk '$1 >= "v1.2.0"')
          PLATFORMS="osx_arm64 osx_amd64 linux_arm64 linux_amd64 linux_arm64_musl linux_amd64_musl windows_arm64 windows_amd64"
          for version in $VERSIONS; do
            for platform in $PLATFORMS; do
              mkdir -p repo/$version/$platform
              gzip -9 -c duckdb_maxmind_${platform}/maxmind.duckdb_extension > repo/$version/$platform/maxmind.duckdb_extension.gz
            done
          done
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: repo
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
